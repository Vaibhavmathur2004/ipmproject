<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
</head>
<body>

    <h1>Student Management System</h1>

    <input type="hidden" id="studentId">

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="course" placeholder="Enter Course">

    <button onclick="saveStudent()">Save / Update Student</button>

    <hr>

    <h2>Student List</h2>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>
    </table>

    <script>

        async function saveStudent() {

            const id = document.getElementById("studentId").value;

            const student = {
                name: document.getElementById("name").value,
                course: document.getElementById("course").value
            };

            if (id) {

                await fetch("/students/" + id, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(student)
                });

            } else {

                await fetch("/students", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(student)
                });
            }

            clearForm();
            loadStudents();
        }

        async function loadStudents() {

            const response = await fetch("/students");
            const students = await response.json();

            let rows = "";

            students.forEach(student => {

                rows += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.course}</td>
                    <td>
                        <button onclick="editStudent(${student.id}, '${student.name}', '${student.course}')">
                            Edit
                        </button>

                        <button onclick="deleteStudent(${student.id})">
                            Delete
                        </button>
                    </td>
                </tr>
                `;
            });

            document.getElementById("studentTable").innerHTML = rows;
        }

        function editStudent(id, name, course) {

            document.getElementById("studentId").value = id;
            document.getElementById("name").value = name;
            document.getElementById("course").value = course;
        }

        async function deleteStudent(id) {

            await fetch("/students/" + id, {
                method: "DELETE"
            });

            loadStudents();
        }

        function clearForm() {

            document.getElementById("studentId").value = "";
            document.getElementById("name").value = "";
            document.getElementById("course").value = "";
        }

        loadStudents();

    </script>

</body>
</html>
